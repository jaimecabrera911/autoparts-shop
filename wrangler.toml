# Sitio estático Astro → Cloudflare Pages
# Docs: https://developers.cloudflare.com/pages/
name = "lujos-ramirez"
compatibility_date = "2025-05-27"

# Pages (build por Git): Cloudflare sube la carpeta dist tras `npm run build`
pages_build_output_dir = "dist"

# Si el panel ejecuta `wrangler deploy`, publica assets sin Worker (sin src/index.ts)
[assets]
directory = "./dist"
